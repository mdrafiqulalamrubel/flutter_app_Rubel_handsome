name: rubel_handsome
description: Rubel Handsome
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  geolocator: ^11.0.0
  sensors_plus: ^4.0.2
  intl: ^0.19.0
  # cached_network_image removed — it depends on sqflite which has no Windows
  # implementation. Image.network() with errorBuilder is used instead.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/daffodil_logo.jpg
